<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SmartCash | Cadastro</title>

    <link rel="stylesheet"
          href="./css/style.css">

</head>

<body class="login-page">

    <main class="login-container">

        <div class="login-card">

            <h1>💰 SmartCash</h1>

            <p class="subtitulo">

                Criar uma nova conta

            </p>

            <form id="form-cadastro">

                <input
                    type="text"
                    id="nome"
                    placeholder="Nome completo"
                    required
                >

                <input
                    type="email"
                    id="email"
                    placeholder="E-mail"
                    required
                >

                <input
                    type="password"
                    id="senha"
                    placeholder="Senha"
                    required
                >

                <button type="submit">

                    Criar Conta

                </button>

            </form>

            <p id="mensagem"></p>

            <hr>

            <p>

                Já possui uma conta?

            </p>

            <a
                href="login.html"
                class="btn-cadastro"
            >

                Fazer Login

            </a>

        </div>

    </main>

    <script src="./js/cadastro.js"></script>

</body>

</html>
