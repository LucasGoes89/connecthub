<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SmartCash | Login</title>

    <link rel="stylesheet"
          href="./css/style.css">

</head>

<body class="login-page">

    <main class="login-container">

        <div class="login-card">

            <h1>💰 SmartCash</h1>

            <p class="subtitulo">

                Controle financeiro inteligente

            </p>

            <form id="form-login">

                <input
                    type="email"
                    id="email"
                    placeholder="E-mail"
                    required
                >

                <input
                    type="password"
                    id="senha"
                    placeholder="Senha"
                    required
                >

                <button type="submit">

                    Entrar

                </button>

            </form>

            <p id="mensagem-erro"></p>

            <hr>

            <p>

                Ainda não possui uma conta?

            </p>

            <a
                href="cadastro.html"
                class="btn-cadastro"
            >

                Criar Conta

            </a>

        </div>

    </main>

    <script src="./js/login.js"></script>

</body>

</html>
